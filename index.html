<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - CSS Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stylemobile.css">
  <style>
    :root {
      --primary: #4361ee;
      --primary-light: #6c8aff;
      --primary-dark: #2d4bdb;
      --accent: #f72585;
      --success: #06d6a0;
      --danger: #ef233c;
      --card-bg: rgba(255,255,255,0.82);
      --card-border: rgba(255,255,255,0.9);
      --text: #0d1b2a;
      --text-muted: #5a6a82;
      --input-bg: rgba(255,255,255,0.7);
      --input-border: rgba(67,97,238,0.18);
      --shadow-card: 0 32px 80px rgba(67,97,238,0.18), 0 2px 8px rgba(0,0,0,0.06);
      --shadow-btn: 0 8px 32px rgba(67,97,238,0.38);
    }

    [data-theme="dark"] {
      --card-bg: rgba(13,21,48,0.82);
      --card-border: rgba(255,255,255,0.07);
      --text: #e8f0ff;
      --text-muted: #7b8fb5;
      --input-bg: rgba(255,255,255,0.04);
      --input-border: rgba(108,138,255,0.18);
      --shadow-card: 0 32px 80px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #0a0f2c;
      transition: background 0.6s ease;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* DAY SKY */
    .sky-day {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #69b8ff 0%, #a8d8ff 40%, #dff3ff 75%, #fff5df 100%);
      opacity: 1;
      transition: opacity 0.9s ease;
    }

    [data-theme="dark"] .sky-day { opacity: 0; }

    /* NIGHT SKY */
    .sky-night {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, #1a2870 0%, #0d1640 35%, #060c24 70%, #030816 100%);
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    [data-theme="dark"] .sky-night { opacity: 1; }

    /* SUN */
    .sun {
      position: absolute;
      width: 100px;
      height: 100px;
      top: 60px;
      right: 13%;
      border-radius: 50%;
      background: radial-gradient(circle, #fff9c4 0%, #ffd34d 45%, #ffb703 100%);
      box-shadow: 0 0 0 16px rgba(255,215,0,0.15), 0 0 80px 20px rgba(255,200,0,0.4), 0 0 160px 40px rgba(255,180,0,0.18);
      animation: sunFloat 12s ease-in-out infinite, sunPulse 5s ease-in-out infinite;
      transition: opacity 0.9s ease;
    }

    [data-theme="dark"] .sun { opacity: 0; pointer-events: none; }

    /* SUN RAYS */
    .sun-rays {
      position: absolute;
      top: 60px;
      right: 13%;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0deg 10deg, rgba(255,235,150,0.5) 10deg 16deg, transparent 16deg 45deg);
      animation: rotateSun 20s linear infinite;
      filter: blur(0.8px);
      transition: opacity 0.9s ease;
    }

    [data-theme="dark"] .sun-rays { opacity: 0; }

    /* MOON */
    .moon {
      position: absolute;
      width: 80px;
      height: 80px;
      top: 65px;
      right: 13%;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 32%, #fffdf0 0%, #f0e8c8 55%, #d8cba8 100%);
      box-shadow: 0 0 40px 12px rgba(240,232,200,0.22), 0 0 100px 20px rgba(180,160,120,0.14), inset -10px -10px 0 0 rgba(0,0,0,0.09);
      opacity: 0;
      animation: moonFloat 14s ease-in-out infinite, moonGlow 7s ease-in-out infinite;
      transition: opacity 0.9s ease;
    }

    [data-theme="dark"] .moon { opacity: 1; }

    .moon::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(190,178,148,0.4);
      top: 22px; left: 20px;
    }

    .moon::after {
      content: '';
      position: absolute;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(190,178,148,0.3);
      top: 46px; left: 42px;
    }

    /* CLOUDS */
    .cloud {
      position: absolute;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.82));
      border-radius: 999px;
      filter: blur(0.5px);
      box-shadow: 0 14px 30px rgba(255,255,255,0.3);
      transition: opacity 0.9s ease;
    }

    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    [data-theme="dark"] .cloud { opacity: 0; }

    .cloud-a { width: 160px; height: 50px; top: 100px; left: -15%; animation: driftCloud 32s linear infinite; }
    .cloud-a::before { width: 65px; height: 65px; top: -30px; left: 14px; }
    .cloud-a::after { width: 88px; height: 88px; top: -44px; left: 50px; }

    .cloud-b { width: 200px; height: 60px; top: 200px; left: -25%; animation: driftCloud 44s linear infinite 5s; opacity: 0.88; }
    .cloud-b::before { width: 78px; height: 78px; top: -38px; left: 20px; }
    .cloud-b::after { width: 98px; height: 98px; top: -46px; left: 62px; }

    .cloud-c { width: 130px; height: 44px; bottom: 160px; left: -20%; animation: driftCloud 36s linear infinite 10s; opacity: 0.72; }
    .cloud-c::before { width: 50px; height: 50px; top: -26px; left: 12px; }
    .cloud-c::after { width: 66px; height: 66px; top: -30px; left: 40px; }

    /* STARS */
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      opacity: 0;
      animation: twinkle 3s ease-in-out infinite;
      transition: opacity 0.9s ease;
    }

    [data-theme="dark"] .star { opacity: 1; }

    /* SHOOTING STARS */
    .shooting {
      position: absolute;
      width: 160px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95));
      transform: rotate(-30deg);
      opacity: 0;
      animation: shoot 10s infinite linear;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.7));
    }

    .shooting::before {
      content: '';
      position: absolute;
      right: 0;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 10px 3px white;
    }

    [data-theme="dark"] .shooting { display: block; }

    /* BIRDS */
    .bird {
      position: absolute;
      color: rgba(30,30,60,0.3);
      font-size: 20px;
      animation: flyBird 20s linear infinite;
      transition: opacity 0.9s ease;
    }

    [data-theme="dark"] .bird { opacity: 0; }

    /* AURORA */
    .aurora {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s ease;
      pointer-events: none;
    }

    .aurora::before {
      content: '';
      position: absolute;
      width: 60vw; height: 60vw;
      border-radius: 45% 55% 60% 40%;
      background: radial-gradient(circle, rgba(76,201,240,0.16), transparent 60%);
      filter: blur(60px);
      top: -20%; left: -10%;
      animation: auroraFloat 16s ease-in-out infinite alternate;
    }

    .aurora::after {
      content: '';
      position: absolute;
      width: 55vw; height: 55vw;
      border-radius: 50% 40% 55% 45%;
      background: radial-gradient(circle, rgba(129,140,248,0.2), transparent 60%);
      filter: blur(55px);
      top: -18%; right: -8%;
      animation: auroraFloat 19s ease-in-out infinite alternate-reverse;
    }

    [data-theme="dark"] .aurora { opacity: 1; }

    /* HORIZON GLOW */
    .horizon {
      position: absolute;
      bottom: -20%;
      left: -10%;
      right: -10%;
      height: 50%;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,210,130,0.45), transparent 60%);
      filter: blur(28px);
      animation: horizonPulse 8s ease-in-out infinite;
      transition: all 0.9s ease;
    }

    [data-theme="dark"] .horizon {
      background: radial-gradient(ellipse at 50% 0%, rgba(70,100,255,0.3), transparent 60%);
      opacity: 0.5;
    }

    /* THEME TRANSITION OVERLAY */
    .theme-burst {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
    }

    .theme-burst.animate {
      animation: burstOut 0.7s ease-out forwards;
    }

    /* ===== LOGIN CARD ===== */
    .page-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
    }

    /* CARD TOP GRADIENT STRIPE */
    .card-stripe {
      height: 5px;
      background: linear-gradient(90deg, #4361ee, #f72585, #4361ee);
      background-size: 200% 100%;
      animation: stripeShift 4s linear infinite;
    }

    /* HEADER */
    .card-header {
      padding: 32px 36px 28px;
      text-align: center;
      position: relative;
    }

    .logo-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, #4361ee, #6c8aff);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 36px rgba(67,97,238,0.35);
      position: relative;
      overflow: hidden;
    }

    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent);
    }

    .logo-wrap i {
      font-size: 30px;
      color: white;
      position: relative;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
      transition: color 0.4s;
    }

    .card-header p {
      font-size: 13.5px;
      color: var(--text-muted);
      font-weight: 400;
      transition: color 0.4s;
    }

    /* DIVIDER */
    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--input-border), transparent);
      margin: 0 24px;
    }

    /* FORM */
    .card-body {
      padding: 28px 36px 24px;
    }

    .field {
      margin-bottom: 18px;
      position: relative;
    }

    .field label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      transition: color 0.4s;
    }

    .field-inner {
      position: relative;
    }

    .field-inner i.icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-muted);
      transition: color 0.3s;
      pointer-events: none;
    }

    .field-inner input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 14px;
      font-size: 14.5px;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      outline: none;
      transition: all 0.3s ease;
    }

    .field-inner input::placeholder { color: var(--text-muted); opacity: 0.7; }

    .field-inner input:focus {
      border-color: var(--primary);
      background: rgba(67,97,238,0.04);
      box-shadow: 0 0 0 4px rgba(67,97,238,0.12);
    }

    .field-inner:focus-within i.icon {
      color: var(--primary);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
      font-size: 15px;
      transition: color 0.3s;
      user-select: none;
      padding: 4px;
    }

    .toggle-pw:hover { color: var(--primary); }

    .field-inner input[type="password"],
    .field-inner input[type="text"] {
      padding-right: 44px;
    }

    /* REMEMBER + FORGOT */
    .row-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      font-size: 13px;
    }

    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.3s;
    }

    .check-label:hover { color: var(--text); }

    .check-label input {
      accent-color: var(--primary);
      width: 15px;
      height: 15px;
    }

    .link-forgot {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      font-size: 13px;
      transition: opacity 0.2s;
    }

    .link-forgot:hover { opacity: 0.75; }

    /* LOGIN BUTTON */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4361ee, #6c8aff);
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: var(--shadow-btn);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      letter-spacing: 0.2px;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .btn-login:hover::before { transform: translateX(100%); }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(67,97,238,0.45); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.75; cursor: not-allowed; transform: none; }

    /* MESSAGES */
    .msg {
      font-size: 13px;
      padding: 11px 14px;
      border-radius: 12px;
      margin-top: 14px;
      display: none;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .msg-error {
      color: #c0192e;
      background: rgba(239,35,60,0.08);
      border: 1px solid rgba(239,35,60,0.2);
    }

    [data-theme="dark"] .msg-error {
      color: #ff6b7a;
      background: rgba(239,35,60,0.12);
    }

    .msg-success {
      color: #047857;
      background: rgba(6,214,160,0.1);
      border: 1px solid rgba(6,214,160,0.25);
    }

    [data-theme="dark"] .msg-success {
      color: #06d6a0;
      background: rgba(6,214,160,0.1);
    }

    /* CARD FOOTER */
    .card-footer {
      padding: 14px 36px 22px;
      text-align: center;
      border-top: 1px solid var(--input-border);
    }

    .card-footer p {
      font-size: 12px;
      color: var(--text-muted);
      transition: color 0.4s;
    }

    #browserInfo {
      margin-top: 4px;
      font-size: 11px;
    }

    /* THEME TOGGLE */
    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.14);
    }

    [data-theme="dark"] .theme-toggle {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.1);
    }

    .theme-toggle:hover {
      transform: rotate(15deg) scale(1.08);
      background: rgba(255,255,255,0.28);
    }

    /* DECORATIVE ORBS (dark mode) */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0;
      transition: opacity 0.9s ease;
      pointer-events: none;
    }

    [data-theme="dark"] .orb { opacity: 1; }

    .orb-1 {
      width: 300px; height: 300px;
      background: rgba(67,97,238,0.22);
      bottom: -80px; left: -60px;
      animation: orbDrift 14s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: 220px; height: 220px;
      background: rgba(247,37,133,0.16);
      top: -50px; right: -40px;
      animation: orbDrift 18s ease-in-out infinite alternate-reverse;
    }

    /* ===== KEYFRAMES ===== */
    @keyframes sunFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes sunPulse {
      0%, 100% { box-shadow: 0 0 0 16px rgba(255,215,0,0.15), 0 0 80px 20px rgba(255,200,0,0.4), 0 0 160px 40px rgba(255,180,0,0.18); }
      50% { box-shadow: 0 0 0 22px rgba(255,215,0,0.2), 0 0 110px 30px rgba(255,200,0,0.52), 0 0 200px 55px rgba(255,180,0,0.22); }
    }

    @keyframes rotateSun { to { transform: rotate(360deg); } }

    @keyframes moonFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-9px); }
    }

    @keyframes moonGlow {
      0%, 100% { box-shadow: 0 0 40px 12px rgba(240,232,200,0.22), 0 0 100px 20px rgba(180,160,120,0.14), inset -10px -10px 0 0 rgba(0,0,0,0.09); }
      50% { box-shadow: 0 0 60px 18px rgba(240,232,200,0.3), 0 0 140px 30px rgba(180,160,120,0.2), inset -10px -10px 0 0 rgba(0,0,0,0.09); }
    }

    @keyframes driftCloud {
      0% { transform: translateX(0); }
      100% { transform: translateX(135vw); }
    }

    @keyframes flyBird {
      0% { transform: translateX(0) translateY(0); }
      100% { transform: translateX(130vw) translateY(-20px); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    @keyframes shoot {
      0%, 65% { opacity: 0; transform: translateX(0) translateY(0) rotate(-30deg); }
      70% { opacity: 1; }
      82% { opacity: 0; transform: translateX(-260px) translateY(190px) rotate(-30deg); }
      100% { opacity: 0; }
    }

    @keyframes auroraFloat {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(6vw, 3vh) rotate(12deg); }
    }

    @keyframes horizonPulse {
      0%, 100% { transform: scaleX(1); opacity: 0.9; }
      50% { transform: scaleX(1.08); opacity: 1; }
    }

    @keyframes orbDrift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(30px, -20px); }
    }

    @keyframes stripeShift {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes burstOut {
      0% { opacity: 0.6; background: radial-gradient(circle at var(--bx,90%) var(--by,5%), rgba(255,255,255,0.5) 0%, transparent 0%); }
      100% { opacity: 0; background: radial-gradient(circle at var(--bx,90%) var(--by,5%), rgba(255,255,255,0.05) 70%, transparent 70%); }
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .page-wrap { padding: 16px; }
      .card-header, .card-body, .card-footer { padding-left: 24px; padding-right: 24px; }
      .sun, .sun-rays, .moon { width: 72px; height: 72px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg-scene">
    <div class="sky-day"></div>
    <div class="sky-night"></div>
    <div class="horizon"></div>
    <div class="aurora"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Day elements -->
    <div class="sun"></div>
    <div class="sun-rays"></div>
    <div class="cloud cloud-a"></div>
    <div class="cloud cloud-b"></div>
    <div class="cloud cloud-c"></div>
    <div class="bird bird-1"><i class="fas fa-dove"></i></div>
    <div class="bird bird-2"><i class="fas fa-dove"></i></div>

    <!-- Night elements -->
    <div class="moon"></div>
    <div id="starsLayer"></div>
    <div class="shooting" style="top:120px; left:82%; animation-delay:0s;"></div>
    <div class="shooting" style="top:250px; left:66%; animation-delay:4.5s;"></div>
    <div class="shooting" style="top:170px; left:90%; animation-delay:8.5s;"></div>
  </div>

  <!-- THEME BURST -->
  <div class="theme-burst" id="themeBurst"></div>

  <!-- THEME TOGGLE -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <i class="fas fa-moon"></i>
  </button>

  <!-- LOGIN CARD -->
  <div class="page-wrap">
    <div class="login-card">
      <div class="card-stripe"></div>

      <div class="card-header">
        <div class="logo-wrap">
          <i class="fas fa-shield-halved"></i>
        </div>
        <h1>CSS Admin Dashboard</h1>
        <p>Silakan masuk ke akun Anda</p>
      </div>

      <div class="card-divider"></div>

      <div class="card-body">
        <div class="field">
          <label for="email">Email</label>
          <div class="field-inner">
            <i class="fas fa-envelope icon"></i>
            <input type="email" id="email" placeholder="email@domain.com" autocomplete="email">
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="field-inner">
            <i class="fas fa-lock icon"></i>
            <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password">
            <span class="toggle-pw" id="togglePassword" role="button" tabindex="0" aria-label="Tampilkan password">
              <i class="fas fa-eye"></i>
            </span>
          </div>
        </div>

        <div class="row-meta">
          <label class="check-label">
            <input type="checkbox" id="remember">
            Remember me
          </label>
          <a href="#" id="forgotPassword" class="link-forgot">Lupa Password?</a>
        </div>

        <button class="btn-login" id="loginBtn">
          <i class="fas fa-arrow-right-to-bracket"></i>&nbsp; Masuk
        </button>

        <div class="msg msg-error" id="loginError"></div>
        <div class="msg msg-success" id="loginSuccess"></div>
      </div>

      <div class="card-footer">
        <p>&copy; 2025 CSS Admin Dashboard. All rights reserved.</p>
        <p id="browserInfo"></p>
      </div>
    </div>
  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDUZka4FZyLi_cv6X_5D4zeRsfkpqOlBpY",
      authDomain: "dashboard-css.firebaseapp.com",
      databaseURL: "https://dashboard-css-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "dashboard-css",
      storageBucket: "dashboard-css.appspot.com",
      messagingSenderId: "771131792881",
      appId: "1:771131792881:web:ad634424225bd7de847850",
      measurementId: "G-3CYBC5B101"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM
    const loginBtn = document.getElementById("loginBtn");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");
    const loginError = document.getElementById("loginError");
    const loginSuccess = document.getElementById("loginSuccess");
    const themeToggle = document.getElementById("themeToggle");
    const forgotPassword = document.getElementById("forgotPassword");
    const browserInfo = document.getElementById("browserInfo");
    const starsLayer = document.getElementById("starsLayer");
    const themeBurst = document.getElementById("themeBurst");

    // Show/hide password
    togglePassword.addEventListener("click", () => {
      const show = passwordInput.type === "password";
      passwordInput.type = show ? "text" : "password";
      togglePassword.innerHTML = show ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
    });

    togglePassword.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); togglePassword.click(); }
    });

    // Stars
    function createStars() {
      if (!starsLayer || starsLayer.childElementCount > 0) return;
      for (let i = 0; i < 130; i++) {
        const s = document.createElement("div");
        s.className = "star";
        const sz = [2, 3, 4][Math.floor(Math.random() * 3)];
        s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*5}s;animation-duration:${2.5+Math.random()*4}s;${sz===4?'box-shadow:0 0 8px 2px rgba(255,255,255,0.7);':''}`;
        starsLayer.appendChild(s);
      }
    }

    // Validation
    function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

    // Messages
    function showError(msg) {
      loginError.innerHTML = '<i class="fas fa-circle-exclamation"></i> ' + msg;
      loginError.style.display = "flex";
      loginSuccess.style.display = "none";
      setTimeout(() => loginError.style.display = "none", 5000);
    }

    function showSuccess(msg) {
      loginSuccess.innerHTML = '<i class="fas fa-circle-check"></i> ' + msg;
      loginSuccess.style.display = "flex";
      loginError.style.display = "none";
      setTimeout(() => loginSuccess.style.display = "none", 3000);
    }

    // Login
    async function handleLogin() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) { showError("Email dan password harus diisi"); return; }
      if (!isValidEmail(email)) { showError("Format email tidak valid"); return; }

      try {
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>&nbsp; Memuat...';
        loginBtn.disabled = true;

        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        try {
          const userDoc = await getDoc(doc(db, 'users', user.uid));

          if (!userDoc.exists()) {
            showError("Data user tidak ditemukan. Silakan hubungi administrator.");
            await auth.signOut();
            loginBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i>&nbsp; Masuk';
            loginBtn.disabled = false;
            return;
          }

          const userData = userDoc.data();

          if (userData.status === 'Suspended') {
            showError("Akun Anda telah di-suspend. Silakan hubungi administrator.");
            await auth.signOut();
            loginBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i>&nbsp; Masuk';
            loginBtn.disabled = false;
            return;
          }

          showSuccess("Login berhasil! Mengarahkan...");

          if (document.getElementById("remember").checked) {
            localStorage.setItem("rememberEmail", email);
          } else {
            localStorage.removeItem("rememberEmail");
          }

          const userData2 = {
            email: user.email,
            uid: user.uid,
            displayName: userData.name || "Administrator",
            role: userData.role || "admin",
            status: userData.status || "Active",
            avatar: userData.image || userData.avatar || 'https://iili.io/KfDh0EN.png'
          };

          sessionStorage.setItem("isLoggedIn", "true");
          sessionStorage.setItem("user", JSON.stringify(userData2));
          localStorage.setItem('currentUser', JSON.stringify(userData2));
          localStorage.setItem('adminName', userData.name || "Administrator");
          localStorage.setItem('adminRole', userData.role || "admin");
          localStorage.setItem('adminProfileImage', userData.image || userData.avatar || 'https://iili.io/KfDh0EN.png');

          setTimeout(() => { window.location.href = "index.html"; }, 1500);

        } catch (firestoreError) {
          console.error("Firestore error:", firestoreError);
          showError("Gagal memuat data user. Silakan coba lagi.");
          await auth.signOut();
          loginBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i>&nbsp; Masuk';
          loginBtn.disabled = false;
        }

      } catch (error) {
        console.error("Login error:", error);
        let msg = "Terjadi kesalahan saat login. Silakan coba lagi.";
        if (error.code) switch (error.code) {
          case "auth/user-not-found":
          case "auth/wrong-password": msg = "Email atau password salah. Silakan periksa kembali."; break;
          case "auth/invalid-email": msg = "Format email tidak valid."; break;
          case "auth/user-disabled": msg = "Akun dinonaktifkan. Silakan hubungi administrator."; break;
          case "auth/too-many-requests": msg = "Terlalu banyak percobaan gagal. Silakan coba lagi nanti."; break;
          case "auth/network-request-failed": msg = "Koneksi jaringan bermasalah. Periksa koneksi internet Anda."; break;
          default: msg = "Tidak dapat mengakses sistem. Silakan coba lagi atau hubungi administrator.";
        }
        showError(msg);
        loginBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i>&nbsp; Masuk';
        loginBtn.disabled = false;
      }
    }

    // Forgot password
    async function handleForgotPassword() {
      const email = emailInput.value.trim();
      if (!email) { showError("Masukkan email untuk reset password"); return; }
      if (!isValidEmail(email)) { showError("Format email tidak valid"); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        showSuccess("Email reset password telah dikirim. Periksa inbox Anda.");
      } catch (error) {
        showError(error.code === "auth/user-not-found" ? "Email tidak terdaftar dalam sistem." : "Terjadi kesalahan saat mengirim email reset password.");
      }
    }

    // Theme
    function toggleTheme() {
      const rect = themeToggle.getBoundingClientRect();
      themeBurst.style.setProperty('--bx', `${rect.left + rect.width / 2}px`);
      themeBurst.style.setProperty('--by', `${rect.top + rect.height / 2}px`);
      themeBurst.classList.remove('animate');
      void themeBurst.offsetWidth;
      themeBurst.classList.add('animate');

      const cur = document.documentElement.getAttribute("data-theme");
      const next = cur === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      themeToggle.querySelector("i").className = next === "dark" ? "fas fa-sun" : "fas fa-moon";

      setTimeout(() => themeBurst.classList.remove('animate'), 750);
    }

    function applySavedTheme() {
      const theme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", theme);
      themeToggle.querySelector("i").className = theme === "dark" ? "fas fa-sun" : "fas fa-moon";
    }

    function detectBrowser() {
      const ua = navigator.userAgent;
      let b = "Unknown Browser";
      if (ua.includes("Firefox")) b = "Mozilla Firefox";
      else if (ua.includes("Edg")) b = "Microsoft Edge";
      else if (ua.includes("Chrome")) b = "Google Chrome";
      else if (ua.includes("Safari")) b = "Safari";
      browserInfo.textContent = "Browser: " + b;
    }

    document.addEventListener("DOMContentLoaded", () => {
      createStars();
      detectBrowser();
      applySavedTheme();

      const remembered = localStorage.getItem("rememberEmail");
      if (remembered) {
        emailInput.value = remembered;
        document.getElementById("remember").checked = true;
      }

      loginBtn.addEventListener("click", handleLogin);
      themeToggle.addEventListener("click", toggleTheme);
      forgotPassword.addEventListener("click", e => { e.preventDefault(); handleForgotPassword(); });

      document.addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });

      auth.onAuthStateChanged(user => {
        if (user) {
          setTimeout(() => { window.location.href = "summary-dashboard.html"; }, 1000);
        }
      });
    });

    window.addEventListener("error", e => console.error("Global error:", e.error));
    window.addEventListener("unhandledrejection", e => { console.error("Unhandled rejection:", e.reason); e.preventDefault(); });
  </script>
</body>
</html>
